<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2563eb">
<title>법인카드 영수증 인식</title>
<style>
  :root{
    --bg:#f4f6fb; --card:#ffffff; --line:#e5e9f2; --text:#1e293b;
    --muted:#64748b; --primary:#2563eb; --primary-dark:#1d4ed8;
    --ok:#16a34a; --danger:#dc2626; --warn:#d97706; --chip:#eff4ff;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; font-family:'Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
    background:var(--bg); color:var(--text); line-height:1.5;
    padding-bottom:80px;
  }
  header{
    position:sticky; top:0; z-index:20; background:var(--primary);
    color:#fff; padding:14px 16px; display:flex; align-items:center;
    justify-content:space-between; box-shadow:0 2px 8px rgba(37,99,235,.25);
  }
  header h1{font-size:17px; margin:0; font-weight:700; display:flex; align-items:center; gap:8px;}
  header button{
    background:rgba(255,255,255,.18); color:#fff; border:none; border-radius:8px;
    padding:7px 10px; font-size:13px; cursor:pointer;
  }
  main{max-width:720px; margin:0 auto; padding:16px;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px; margin-bottom:14px; box-shadow:0 1px 3px rgba(15,23,42,.04);}
  .card h2{font-size:14px; margin:0 0 12px; color:var(--muted); font-weight:700; letter-spacing:.02em;}

  .capture-btn{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:8px; width:100%; padding:28px 16px; border:2px dashed var(--primary);
    border-radius:14px; background:var(--chip); color:var(--primary);
    font-size:16px; font-weight:700; cursor:pointer;
  }
  .capture-btn svg{width:40px; height:40px;}
  .capture-btn small{font-weight:500; color:var(--muted); font-size:12px;}
  input[type=file]{display:none;}

  .preview{margin-top:14px; text-align:center;}
  .preview img{max-width:100%; max-height:280px; border-radius:10px; border:1px solid var(--line);}

  .status{margin-top:12px; padding:10px 12px; border-radius:10px; font-size:13px; display:none;}
  .status.show{display:block;}
  .status.loading{background:#fffbeb; color:var(--warn); border:1px solid #fde68a;}
  .status.error{background:#fef2f2; color:var(--danger); border:1px solid #fecaca;}
  .status.ok{background:#f0fdf4; color:var(--ok); border:1px solid #bbf7d0;}

  .field{margin-bottom:12px;}
  .field label{display:block; font-size:12px; color:var(--muted); margin-bottom:4px; font-weight:600;}
  .field input, .field select, .field textarea{
    width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:10px;
    font-size:15px; font-family:inherit; background:#fff; color:var(--text);
  }
  .field input:focus, .field select:focus, .field textarea:focus{outline:none; border-color:var(--primary);}
  .row{display:flex; gap:10px;} .row .field{flex:1;}

  .btn{display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:12px 16px; border:none; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; width:100%;}
  .btn-primary{background:var(--primary); color:#fff;}
  .btn-primary:active{background:var(--primary-dark);}
  .btn-ghost{background:#fff; color:var(--text); border:1px solid var(--line);}
  .btn-danger{background:#fff; color:var(--danger); border:1px solid #fecaca;}
  .btn-sm{padding:8px 12px; font-size:13px; width:auto;}
  .btn-group{display:flex; gap:10px;}

  .summary{display:flex; gap:10px; margin-bottom:14px;}
  .summary .box{flex:1; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px; text-align:center;}
  .summary .box b{display:block; font-size:20px; color:var(--primary);}
  .summary .box span{font-size:11px; color:var(--muted);}

  .item{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:13px 14px; margin-bottom:10px;}
  .item .top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .item .store{font-weight:700; font-size:15px;}
  .item .amt{font-weight:800; color:var(--primary); font-size:16px; white-space:nowrap;}
  .item .meta{font-size:12px; color:var(--muted); margin-top:4px;}
  .item .actions{display:flex; gap:8px; margin-top:10px;}
  .item .thumb{width:42px; height:42px; border-radius:8px; object-fit:cover; border:1px solid var(--line); cursor:pointer;}
  .item-head{display:flex; gap:10px;}
  .empty{text-align:center; color:var(--muted); padding:30px 10px; font-size:14px;}

  .modal{position:fixed; inset:0; background:rgba(15,23,42,.55); display:none; align-items:center; justify-content:center; z-index:50; padding:16px;}
  .modal.show{display:flex;}
  .modal .panel{background:#fff; border-radius:16px; width:100%; max-width:480px; max-height:90vh; overflow:auto; padding:18px;}
  .modal .panel h3{margin:0 0 14px; font-size:16px;}
  .modal img{max-width:100%; border-radius:10px;}

  .hint{font-size:12px; color:var(--muted); margin-top:6px;}
  a.link{color:var(--primary); text-decoration:none;}
  .tabbar{position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--line); display:flex; z-index:30;}
  .tabbar button{flex:1; background:none; border:none; padding:10px 0 12px; font-size:11px; color:var(--muted); cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px;}
  .tabbar button.active{color:var(--primary); font-weight:700;}
  .tabbar svg{width:22px; height:22px;}
  .view{display:none;} .view.active{display:block;}
  details summary{cursor:pointer; font-size:13px; color:var(--muted);}
  pre.raw{white-space:pre-wrap; font-size:12px; background:#f8fafc; padding:10px; border-radius:8px; max-height:200px; overflow:auto; color:#475569;}
</style>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
<header>
  <h1>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
    법인카드 영수증
  </h1>
  <span style="font-size:11px; opacity:.85;">무료 OCR · 설치 불필요</span>
</header>

<main>
  <!-- ============ 촬영/인식 화면 ============ -->
  <section id="view-scan" class="view active">
    <div class="card">
      <h2>1. 영수증 촬영</h2>
      <label class="capture-btn" for="fileInput">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        영수증 촬영 / 사진 선택
        <small>휴대폰 카메라로 영수증을 찍으면 자동 인식됩니다</small>
      </label>
      <input type="file" id="fileInput" accept="image/*" capture="environment">
      <div class="preview" id="preview"></div>
      <div class="status" id="status"></div>
    </div>

    <div class="card" id="resultCard" style="display:none;">
      <h2>2. 인식 결과 확인 / 수정</h2>
      <div class="field">
        <label>가맹점 (상호)</label>
        <input type="text" id="f-store" placeholder="예: 스타벅스 강남점">
      </div>
      <div class="row">
        <div class="field">
          <label>사용일자</label>
          <input type="date" id="f-date">
        </div>
        <div class="field">
          <label>금액 (원)</label>
          <input type="number" id="f-amount" inputmode="numeric" placeholder="0">
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>사업자번호</label>
          <input type="text" id="f-bizno" placeholder="000-00-00000">
        </div>
        <div class="field">
          <label>분류</label>
          <select id="f-category">
            <option>복리_식대(내부)</option>
            <option>복리_업무활동(외부)</option>
            <option>교통비</option>
            <option>기타</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>구분</label>
          <select id="f-type">
            <option value="내부">내부</option>
            <option value="외부">외부</option>
          </select>
        </div>
        <div class="field" id="company-field" style="display:none;">
          <label>회사명 (외부)</label>
          <input type="text" id="f-company" placeholder="상대 회사명">
        </div>
      </div>
      <div class="field">
        <label>누구와 (동석자)</label>
        <input type="text" id="f-with" placeholder="예: 홍길동 과장 / 거래처 2명">
      </div>
      <div class="field">
        <label>메모</label>
        <input type="text" id="f-memo" placeholder="사용 목적 등 (선택)">
      </div>
      <details>
        <summary>인식된 원문 보기</summary>
        <pre class="raw" id="rawText"></pre>
      </details>
      <div class="btn-group" style="margin-top:14px;">
        <button class="btn btn-ghost" id="btnDiscard">취소</button>
        <button class="btn btn-primary" id="btnSave">저장하기</button>
      </div>
    </div>
  </section>

  <!-- ============ 내역 목록 화면 ============ -->
  <section id="view-list" class="view">
    <div class="summary">
      <div class="box"><b id="sumCount">0</b><span>총 건수</span></div>
      <div class="box"><b id="sumAmount">0</b><span>총 금액(원)</span></div>
      <div class="box"><b id="sumMonth">0</b><span>이번달(원)</span></div>
    </div>
    <div class="card" style="padding:12px;">
      <div class="btn-group">
        <button class="btn btn-ghost btn-sm" id="btnExport">📤 CSV 내보내기</button>
        <button class="btn btn-danger btn-sm" id="btnClearAll">전체 삭제</button>
      </div>
    </div>
    <div id="list"></div>
  </section>
</main>

<!-- 탭바 -->
<nav class="tabbar">
  <button class="active" data-view="scan">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><circle cx="12" cy="13" r="3"/></svg>
    촬영
  </button>
  <button data-view="list">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    내역
  </button>
</nav>

<!-- 이미지 확대 모달 -->
<div class="modal" id="modalImage">
  <div class="panel" style="text-align:center;">
    <img id="modalImg" src="" alt="영수증">
    <button class="btn btn-ghost" id="btnCloseImage" style="margin-top:12px;">닫기</button>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const KEY_DATA = 'cc_receipts';

/* ---------------- 화면 전환 ---------------- */
document.querySelectorAll('.tabbar button').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.tabbar button').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    $('#view-'+b.dataset.view).classList.add('active');
    if(b.dataset.view==='list') renderList();
  });
});

/* ---------------- 구분(내부/외부) ↔ 회사명/분류 연동 ---------------- */
function syncTypeUI(){
  $('#company-field').style.display = ($('#f-type').value === '외부') ? '' : 'none';
}
$('#f-type').addEventListener('change', syncTypeUI);
$('#f-category').addEventListener('change', ()=>{
  const c = $('#f-category').value;
  if(c.includes('외부')) $('#f-type').value = '외부';
  else if(c.includes('내부')) $('#f-type').value = '내부';
  syncTypeUI();
});

/* ---------------- 이미지 모달 ---------------- */
$('#btnCloseImage').onclick = ()=> $('#modalImage').classList.remove('show');

/* ---------------- 상태 표시 ---------------- */
function showStatus(type,msg){
  const el = $('#status');
  el.className = 'status show '+type;
  el.textContent = msg;
}
function hideStatus(){ $('#status').className='status'; }

/* ---------------- 이미지 → 압축 base64 ---------------- */
function fileToCompressedBase64(file, maxSize=1600, quality=0.85){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    const reader = new FileReader();
    reader.onload = e => img.src = e.target.result;
    reader.onerror = reject;
    img.onload = ()=>{
      let {width,height} = img;
      if(Math.max(width,height) > maxSize){
        const r = maxSize/Math.max(width,height);
        width = Math.round(width*r); height = Math.round(height*r);
      }
      const canvas = document.createElement('canvas');
      canvas.width=width; canvas.height=height;
      canvas.getContext('2d').drawImage(img,0,0,width,height);
      const dataUrl = canvas.toDataURL('image/jpeg', quality);
      resolve(dataUrl);
    };
    img.onerror = reject;
    reader.readAsDataURL(file);
  });
}

let currentImage = null; // 현재 인식 중인 이미지 dataURL

/* ---------------- 파일 선택 → OCR ---------------- */
$('#fileInput').addEventListener('change', async (e)=>{
  const file = e.target.files[0];
  if(!file) return;

  try{
    const dataUrl = await fileToCompressedBase64(file);
    currentImage = dataUrl;
    $('#preview').innerHTML = `<img src="${dataUrl}" alt="미리보기">`;
    $('#resultCard').style.display='none';
    showStatus('loading','인식 엔진을 준비하는 중입니다...');

    const text = await runOCR(dataUrl);
    const parsed = parseReceipt(text);

    $('#rawText').textContent = text || '(인식된 텍스트 없음)';
    $('#f-store').value  = parsed.store;
    $('#f-date').value   = parsed.date;
    $('#f-amount').value = parsed.amount || '';
    $('#f-bizno').value  = parsed.bizno;
    $('#f-category').value = '복리_식대(내부)';
    $('#f-type').value   = '내부';
    $('#f-company').value = '';
    $('#f-with').value   = '';
    $('#f-memo').value   = '';
    syncTypeUI();
    $('#resultCard').style.display='block';
    showStatus('ok','인식 완료! 내용을 확인하고 저장하세요. (틀린 부분은 직접 수정하세요)');
  }catch(err){
    console.error(err);
    showStatus('error','인식 실패: '+err.message);
  }finally{
    e.target.value='';
  }
});

/* ---------------- Tesseract.js OCR (무료, 브라우저 내장) ---------------- */
let ocrWorker = null;
async function getWorker(){
  if(ocrWorker) return ocrWorker;
  ocrWorker = await Tesseract.createWorker(['kor','eng'], 1, {
    logger: m => {
      if(m.status === 'recognizing text'){
        showStatus('loading', `영수증 인식 중... ${Math.round(m.progress*100)}%`);
      }
    }
  });
  return ocrWorker;
}
async function runOCR(dataUrl){
  const worker = await getWorker();
  const { data:{ text } } = await worker.recognize(dataUrl);
  return text;
}

/* ---------------- 영수증 텍스트 파싱 ---------------- */
function parseReceipt(text){
  const result = { store:'', date:'', amount:0, bizno:'' };
  if(!text) return result;
  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);

  // 사업자번호 000-00-00000
  const bizMatch = text.match(/\b\d{3}-\d{2}-\d{5}\b/);
  if(bizMatch) result.bizno = bizMatch[0];

  // 날짜: YYYY-MM-DD / YYYY.MM.DD / YYYY/MM/DD / YYYY년 MM월 DD일
  let dm = text.match(/(20\d{2})[.\-\/년\s]+(\d{1,2})[.\-\/월\s]+(\d{1,2})/);
  if(dm){
    const y=dm[1], mo=dm[2].padStart(2,'0'), d=dm[3].padStart(2,'0');
    result.date = `${y}-${mo}-${d}`;
  }

  // 금액: '합계/총액/결제/받을금액/판매' 키워드 우선, 없으면 최대 금액
  const amountKeywords = /(합\s*계|총\s*액|결제\s*금액|받을\s*금액|승인\s*금액|판매\s*금액|총\s*구매|합계금액|금\s*액)/;
  const numRe = /([0-9]{1,3}(?:,[0-9]{3})+|[0-9]{4,})/g;
  let best = 0, keyworded = 0;
  lines.forEach(line=>{
    const nums = line.match(numRe);
    if(!nums) return;
    const vals = nums.map(n=>parseInt(n.replace(/,/g,''),10)).filter(v=>v>=100 && v<100000000);
    if(!vals.length) return;
    const lineMax = Math.max(...vals);
    if(amountKeywords.test(line)) keyworded = Math.max(keyworded, lineMax);
    best = Math.max(best, lineMax);
  });
  result.amount = keyworded || best || 0;

  // 상호: 키워드 라벨 옆, 없으면 상단부 의미있는 줄
  let storeLine = lines.find(l=>/(상\s*호|가\s*맹\s*점|점\s*명)/.test(l));
  if(storeLine){
    result.store = storeLine.replace(/.*(상\s*호|가\s*맹\s*점|점\s*명)\s*[:：]?/,'').trim();
  }
  if(!result.store){
    const cand = lines.find(l=>
      l.length>=2 && l.length<=25 &&
      !/^\d/.test(l) && !/\d{3}-\d{2}-\d{5}/.test(l) &&
      !/(영수증|사업자|대표자|전화|주소|tel|http)/i.test(l)
    );
    result.store = cand || lines[0] || '';
  }
  return result;
}

/* ---------------- 저장 ---------------- */
function loadData(){ try{return JSON.parse(localStorage.getItem(KEY_DATA))||[];}catch{return [];} }
function saveData(d){ localStorage.setItem(KEY_DATA, JSON.stringify(d)); }

$('#btnSave').onclick = ()=>{
  const rec = {
    id: Date.now(),
    store: $('#f-store').value.trim() || '(미입력)',
    date: $('#f-date').value || new Date().toISOString().slice(0,10),
    amount: parseInt($('#f-amount').value||'0',10),
    bizno: $('#f-bizno').value.trim(),
    category: $('#f-category').value,
    type: $('#f-type').value,
    company: $('#f-type').value === '외부' ? $('#f-company').value.trim() : '',
    withWhom: $('#f-with').value.trim(),
    memo: $('#f-memo').value.trim(),
    image: currentImage
  };
  const data = loadData();
  data.unshift(rec);
  saveData(data);
  resetScan();
  showStatus('ok','저장되었습니다. ‘내역’ 탭에서 확인하세요.');
};

$('#btnDiscard').onclick = resetScan;
function resetScan(){
  currentImage=null;
  $('#preview').innerHTML='';
  $('#resultCard').style.display='none';
  $('#rawText').textContent='';
  setTimeout(hideStatus, 1500);
}

/* ---------------- 목록 렌더 ---------------- */
function fmt(n){ return (n||0).toLocaleString('ko-KR'); }

function renderList(){
  const data = loadData();
  const list = $('#list');
  $('#sumCount').textContent = data.length;
  const total = data.reduce((s,r)=>s+(r.amount||0),0);
  $('#sumAmount').textContent = fmt(total);
  const ym = new Date().toISOString().slice(0,7);
  const monthTotal = data.filter(r=>(r.date||'').startsWith(ym)).reduce((s,r)=>s+(r.amount||0),0);
  $('#sumMonth').textContent = fmt(monthTotal);

  if(!data.length){ list.innerHTML = '<div class="empty">저장된 영수증이 없습니다.<br>‘촬영’ 탭에서 영수증을 찍어보세요.</div>'; return; }

  list.innerHTML = data.map(r=>`
    <div class="item" data-id="${r.id}">
      <div class="item-head">
        ${r.image?`<img class="thumb" src="${r.image}" data-img="${r.id}" alt="">`:''}
        <div style="flex:1;">
          <div class="top">
            <span class="store">${esc(r.store)}</span>
            <span class="amt">${fmt(r.amount)}원</span>
          </div>
          <div class="meta">${r.date} · ${esc(r.category)}${r.type?' · '+esc(r.type):''}${r.company?' · '+esc(r.company):''}</div>
          ${r.withWhom?`<div class="meta">👥 ${esc(r.withWhom)}</div>`:''}
          ${r.memo?`<div class="meta">📝 ${esc(r.memo)}</div>`:''}
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-danger btn-sm" data-del="${r.id}">삭제</button>
      </div>
    </div>
  `).join('');

  list.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{
    if(!confirm('이 영수증을 삭제할까요?')) return;
    saveData(loadData().filter(x=>x.id!=b.dataset.del));
    renderList();
  });
  list.querySelectorAll('[data-img]').forEach(img=>img.onclick=()=>{
    const rec = loadData().find(x=>x.id==img.dataset.img);
    if(rec?.image){ $('#modalImg').src=rec.image; $('#modalImage').classList.add('show'); }
  });
}
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ---------------- CSV 내보내기 ---------------- */
$('#btnExport').onclick = ()=>{
  const data = loadData();
  if(!data.length){ alert('내보낼 내역이 없습니다.'); return; }
  const header = ['사용일자','가맹점','금액','분류','구분','회사명','동석자','사업자번호','메모'];
  const rows = data.map(r=>[r.date,r.store,r.amount,r.category,r.type,r.company,r.withWhom,r.bizno,r.memo]
    .map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(','));
  const csv = '﻿'+header.join(',')+'\n'+rows.join('\n'); // BOM(엑셀 한글)
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `법인카드내역_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
};

$('#btnClearAll').onclick = ()=>{
  if(!loadData().length) return;
  if(confirm('모든 영수증 내역을 삭제할까요? 되돌릴 수 없습니다.')){
    saveData([]); renderList();
  }
};

/* 모달 바깥 클릭 닫기 */
document.querySelectorAll('.modal').forEach(m=>m.addEventListener('click',e=>{ if(e.target===m) m.classList.remove('show'); }));
</script>
